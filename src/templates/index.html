<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS CPU Stress Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --panel: #111827;
      --panel-soft: #172033;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --alarm: #fb7185;
      --ok: #34d399;
      --warn: #fbbf24;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(34, 211, 238, 0.16), transparent 28rem),
        radial-gradient(circle at 82% 70%, rgba(251, 113, 133, 0.14), transparent 30rem),
        linear-gradient(145deg, #080b12 0%, #111827 52%, #0f172a 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 28px;
    }

    main {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(280px, 1fr);
      gap: 28px;
      align-items: center;
    }

    .console,
    .metrics {
      border: 1px solid var(--line);
      background: rgba(17, 24, 39, 0.78);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      border-radius: 8px;
    }

    .console {
      padding: 30px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .copy {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .stress-button {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 8px;
      color: #06111a;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      background: linear-gradient(135deg, #67e8f9, #34d399 56%, #fbbf24);
      box-shadow: 0 18px 42px rgba(34, 211, 238, 0.24);
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .stress-button:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .stress-button:disabled { cursor: wait; filter: saturate(0.75); transform: none; }

    .status-line {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .status-value {
      color: var(--ok);
      font-weight: 800;
      text-align: right;
    }

    .status-value.alarm { color: var(--alarm); }
    .status-value.running { color: var(--warn); }

    .metrics {
      min-height: 520px;
      padding: 26px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .gauge {
      width: min(330px, 80vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--panel) 0 55%, transparent 56%),
        conic-gradient(var(--accent) calc(var(--value) * 1%), rgba(255, 255, 255, 0.08) 0);
      transition: background 0.35s ease;
      position: relative;
    }

    .gauge::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gauge.alarm {
      background:
        radial-gradient(circle at center, var(--panel) 0 55%, transparent 56%),
        conic-gradient(var(--alarm) calc(var(--value) * 1%), rgba(255, 255, 255, 0.08) 0);
      box-shadow: 0 0 58px rgba(251, 113, 133, 0.18);
    }

    .gauge-inner {
      width: 68%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(145deg, #0f172a, #111827);
      border: 1px solid var(--line);
      z-index: 1;
      text-align: center;
    }

    .gauge-number {
      display: block;
      font-size: clamp(54px, 9vw, 82px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .gauge-label {
      display: block;
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-grid {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 26px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 760px) {
      body { padding: 18px; }
      main { grid-template-columns: 1fr; }
      .metrics { min-height: 460px; }
      .metric-grid { grid-template-columns: 1fr; position: static; width: 100%; margin-top: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="console" aria-label="CPU stress controls">
      <div class="eyebrow">Feature 4 · CloudWatch Alarm Lab</div>
      <h1>CPU Stress Monitor</h1>
      <p class="copy">
        點擊按鈕後會呼叫 <strong>/feature4</strong>，伺服器將執行約 15-20 秒的密集計算，
        用來觸發 AWS CloudWatch CPU 使用率警報。
      </p>

      <button id="stress-button" class="stress-button" type="button">壓力測試 (Stress)</button>

      <div class="status-line">
        <span>狀態</span>
        <span id="status-value" class="status-value">READY</span>
      </div>
    </section>

    <section class="metrics" aria-label="CPU gauge">
      <div id="gauge" class="gauge" style="--value: 8">
        <div class="gauge-inner">
          <div>
            <span id="gauge-number" class="gauge-number">8</span>
            <span class="gauge-label">CPU %</span>
          </div>
        </div>
      </div>

      <div class="metric-grid">
        <div class="metric">
          <span>Threshold</span>
          <strong>70% / 1 min</strong>
        </div>
        <div class="metric">
          <span>Target</span>
          <strong>&gt; 90%</strong>
        </div>
        <div class="metric">
          <span>Route</span>
          <strong>/feature4</strong>
        </div>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById('stress-button');
    const gauge = document.getElementById('gauge');
    const gaugeNumber = document.getElementById('gauge-number');
    const statusValue = document.getElementById('status-value');
    let currentValue = 8;
    let animationFrame = null;

    function setGauge(value) {
      currentValue = Math.max(0, Math.min(100, value));
      gauge.style.setProperty('--value', currentValue);
      gaugeNumber.textContent = Math.round(currentValue);
      gauge.classList.toggle('alarm', currentValue >= 70);
    }

    function animateGauge(target, duration = 850) {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      const start = currentValue;
      const startedAt = performance.now();

      function tick(now) {
        const progress = Math.min((now - startedAt) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setGauge(start + (target - start) * eased);
        if (progress < 1) animationFrame = requestAnimationFrame(tick);
      }

      animationFrame = requestAnimationFrame(tick);
    }

    button.addEventListener('click', async () => {
      button.disabled = true;
      button.textContent = '壓力測試執行中...';
      statusValue.textContent = '警報 (ALARM)';
      statusValue.className = 'status-value alarm';
      animateGauge(94);

      try {
        const response = await fetch('/feature4?duration=60');
        const data = await response.json();
        statusValue.textContent = data.status === 'success' ? '完成 · ALARM 已觸發' : '回應異常';
        statusValue.className = data.status === 'success' ? 'status-value running' : 'status-value alarm';
      } catch (error) {
        statusValue.textContent = '請求失敗';
        statusValue.className = 'status-value alarm';
      } finally {
        button.disabled = false;
        button.textContent = '再次壓力測試 (Stress)';
      }
    });
  </script>
</body>
</html>
