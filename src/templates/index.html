<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS DevOps 功能模組</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 30%, #1a2a6c 0%, #0d1b3e 50%, #07111f 100%);
      font-family: 'Noto Sans TC', sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .icon-box {
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .card-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-desc {
      color: rgba(255, 255, 255, 0.55);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(0px) scale(0.98);
    }

    .btn-feature1 {
      background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
      color: #1a0a00;
      box-shadow: 0 8px 24px rgba(247, 151, 30, 0.45);
    }

    .btn-feature2 {
      background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(0, 198, 251, 0.35);
    }

    .btn-feature3 {
      background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      color: #1a0030;
      box-shadow: 0 8px 24px rgba(161, 140, 209, 0.45);
    }

    /* 結果彈出卡 */
    .result-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 30, 60, 0.95);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }

    .result-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="icon-box">⭐</div>
      <h1 class="card-title">新追加特色功能模組</h1>
    </div>

    <p class="card-desc">
      系統已動態串接三大情境功能，包含早晨台股搓合盤、下午上班企業門戶與晚間活動提醒：
    </p>

    <button id="btn-feature1" class="btn btn-feature1" onclick="callFeature('/feature1')">
      🟡 早上看股票行情盤 (Feature 1)
    </button>

    <button id="btn-feature2" class="btn btn-feature2" onclick="callFeature('/feature2')">
      🗂️ 下午上班企業簽到門戶 (Feature 2)
    </button>

    <button id="btn-feature3" class="btn btn-feature3" onclick="callFeature('/feature3')">
      ☕ 晚上活動 (Feature 3)
    </button>
  </div>

  <div id="toast" class="result-toast"></div>

  <script>
    async function callFeature(route) {
      try {
        const res = await fetch(route);
        const data = await res.json();
        showToast(data.message);
      } catch (e) {
        showToast('❌ 無法連線到伺服器');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
